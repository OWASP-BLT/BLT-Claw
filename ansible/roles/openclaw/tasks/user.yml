---
# tasks/user.yml — Create openclaw system user

- name: Create openclaw group
  ansible.builtin.group:
    name: "{{ openclaw_group }}"
    system: true
    state: present

- name: Create openclaw system user
  ansible.builtin.user:
    name: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    home: "{{ openclaw_home }}"
    create_home: true
    system: true
    shell: /usr/sbin/nologin
    comment: "OpenClaw daemon"
    state: present

- name: Ensure config directory exists
  ansible.builtin.file:
    path: "{{ openclaw_config_dir }}"
    state: directory
    owner: "{{ openclaw_user }}"
    group: "{{ openclaw_group }}"
    mode: "0750"
