---
# tasks/nodejs.yml — Install Node.js via NodeSource

- name: Check installed Node.js version
  ansible.builtin.command: node --version
  register: node_version_check
  changed_when: false
  failed_when: false

- name: Determine if Node.js upgrade is needed
  ansible.builtin.set_fact:
    node_needs_install: >-
      {{ node_version_check.rc != 0 or
         (node_version_check.stdout | regex_replace('^v', '') | split('.') | first | int) < (nodejs_major_version | int) }}

- name: Add NodeSource GPG key (Debian/Ubuntu)
  ansible.builtin.get_url:
    url: "https://deb.nodesource.com/gpgkey/nodesource-repo.gpg.key"
    dest: /usr/share/keyrings/nodesource.asc
    mode: "0644"
  when: node_needs_install and ansible_os_family == "Debian"

- name: Add NodeSource apt repository (Debian/Ubuntu)
  ansible.builtin.apt_repository:
    repo: >-
      deb [signed-by=/usr/share/keyrings/nodesource.asc]
      https://deb.nodesource.com/node_{{ nodejs_major_version }}.x nodistro main
    state: present
    filename: nodesource
  when: node_needs_install and ansible_os_family == "Debian"

- name: Install Node.js (Debian/Ubuntu)
  ansible.builtin.apt:
    name: nodejs
    state: present
    update_cache: true
  when: node_needs_install and ansible_os_family == "Debian"

- name: Add NodeSource rpm repository (RedHat)
  ansible.builtin.get_url:
    url: "https://rpm.nodesource.com/setup_{{ nodejs_major_version }}.x"
    dest: /tmp/nodesource_setup.sh
    mode: "0755"
  when: node_needs_install and ansible_os_family == "RedHat"

- name: Run NodeSource setup script (RedHat)
  ansible.builtin.command: bash /tmp/nodesource_setup.sh
  when: node_needs_install and ansible_os_family == "RedHat"
  changed_when: true

- name: Install Node.js (RedHat)
  ansible.builtin.dnf:
    name: nodejs
    state: present
  when: node_needs_install and ansible_os_family == "RedHat"
